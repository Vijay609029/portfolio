<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *
        {
            font-size:20px;
            font-weight: bold;
            box-sizing: border-box;
        }
        button
        {
            width:40px;
            height:40px;
            padding: 5px;
            border-radius: 60px;
            background-color: white;
            border:none;
            color: black;
            box-shadow: 1px 1px 10px gray inset;
        }
        #v1
        {
            width:250px;
            height: 40px;
            background-color:whitesmoke;
        color:black;}
        table
        {
            margin:20px auto;
            border-radius:10px;
        }
    </style>
</head>
<body>
    <table bgcolor="darkgray" align="center" width="250px" height="300px">
        <tr>
            <th colspan="4"> <input type="text" id="v1" width="250px" height="40px" readonly></th>
        </tr>
        <tr>
            <th><button  onclick="allclear();">AC</button></th>
            <th><button onclick="display('%');">%</button></th>
            <th><button onclick="allclear();">X</button></th>
            <th><button onclick="display('/')">/</button></th>
        </tr>
        <tr>
            <th><button onclick="display('7');">7</button></th>
            <th><button onclick="display('8');" >8</button></th>
            <th><button onclick="display('9');" >9</button></th>
            <th><button onclick="display('*');" >*</button></th>
        </tr>
        <tr>
            <th><button onclick="display('4');" >4</button></th>
            <th><button  onclick="display('5');">5</button></th>
            <th><button  onclick="display('6');">6</button></th>
            <th><button onclick="display('-');" >-</button></th>
        </tr>
        <tr>
            <th><button onclick="display('1');">1</button></th>
            <th><button onclick="display('2');" >2</button></th>
            <th><button onclick="display('3');">3</button></th>
            <th><button onclick="display('+');">+</button></th>
        </tr>
        </tr>
        <tr>
            <th><button onclick="display('00');">00</button></th>
            <th><button onclick="display('0');">0</button></th>
            <th><button onclick="display('.');">.</button></th>
            <th><button onclick="calculation();">=</button></th>
        </tr>
    </table>
</body>
<script>
   let m;
display = (m) =>
{
  
if(isNaN("#v1"))
{
    document.querySelector("#v1").value+=m;
}
else
{
 document.querySelector("#v1").value="";   
}
}
calculation =() =>

{

  m=eval(document.querySelector("#v1").value);
  if(!isNaN(m))
  {
  document.querySelector("#v1").value=m;
  }
}
 allclear =() =>
{
    document.querySelector("#v1").value="";
}
</script>
</html>
