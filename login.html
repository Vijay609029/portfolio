<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Login Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

form{
    width:350px;
    background-color:#fff;
    padding:25px;
    border-radius:15px;
    transition:.4s;
    margin-top:0px;
}
h2{
    text-align:center;
    margin-bottom:20px;
    color:black;
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:16px;
}

input:focus{
    border:2px solid #007bff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    margin-bottom:5px;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}
#c1
{
    width:20px;
}
button:hover{
    background:#0056b3;
}

a{
    display:inline;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#007bff;
}

a:hover{
    text-decoration:underline;
}
img

{    width:200px;
 display:flex;
 justify-content: center;align-items: center;
 margin:0 auto 0;
}

@media(max-width:480px){

form{
    width:90%;
}
}
@media(max-width:768px){

form{
    width:60%;
}
}
@media(max-width:992px){

form{
    width:400px;
}

}

</style>

</head>

<body>
<form onsubmit="validation()">
<img src="logo.jpg" align="center">
<h2>Login</h2>

<input type="text" id="user" placeholder="Enter User ID" required>

<input type="password" id="pass" placeholder="Enter Password" required maxlength="8">
<input type="checkbox" id="c1" required>Remember me

<button type="submit" onclick="resume();">Login</button>

<a href="createacc.html" id="c11">Create New Account</a>&nbsp;&nbsp;<a href="">forget password</a>

</form>

</body>
<script>

function validation(){

let user=document.querySelector("#user").value;
let pass=document.querySelector("#pass").value;

}
resume =()=>
{
    window.location.href="resume1.html";
}

</script>

</html>
